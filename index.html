function addCadence(dateStr, val, unit){
  const d=new Date(dateStr+"T00:00:00"); const n=Number(val)||1;
  if(unit==="months") d.setMonth(d.getMonth()+n);
  else if(unit==="days") d.setDate(d.getDate()+n);
  else d.setDate(d.getDate()+n*7);
  return d.toISOString().slice(0,10);
}
async function spawnRecurringCard(s, due){

    customer_name:s.customer_name, account_number:s.account_number||null, contact_name:s.contact_name||null, phone:s.phone||null,
    category:"Other", urgency:"Medium", suggested_action:"Visit",
    reason:s.note||("Recurring visit — every "+s.cadence_value+" "+s.cadence_unit),
    status:(s.assigned_to&&s.assigned_to!=="Unassigned")?"Assigned":"New", assigned_to:s.assigned_to||"Unassigned",
    next_follow_up:due, source:"Recurring visit", recurring_id:s.id, first_touched_at:null, last_action_date:today() });
}
// Safety net only: if an active schedule is overdue AND has no open card, spawn one.
// The normal rhythm is driven by "Complete visit" (completeVisit), not this.
async function spawnDueVisits(){
  try{
    const due=(S.recurring||[]).filter(s=>s.active && s.next_due && s.next_due<=today());
    if(!due.length) return;
    let spawned=false;
    for(const s of due){
      const hasOpen=(S.rows||[]).some(r=>r.recurring_id===s.id && OPEN_STATUSES.includes(r.status));
      if(hasOpen) continue;
      await spawnRecurringCard(s, s.next_due); spawned=true;
    }
    if(spawned){
      const [reqs,ups]=await Promise.all([ sbGet("cp_requests?select=*&order=submitted_at.desc"), sbGet("cp_updates?select=*&order=created_at.asc") ]);
      S.rows=reqs; S.updates=ups;
      S.recurring=await sbGet("cp_recurring?select=*&order=next_due.asc");
    }
  }catch(e){ /* never let spawning break a normal load */ }
}
async function completeVisit(r){
  if(!r || r.source!=="Recurring visit") return;
  const sched=(S.recurring||[]).find(s=>s.id===r.recurring_id);
  const next=sched ? addCadence(today(), sched.cadence_value, sched.cadence_unit) : null;
  if(!confirm("Mark this visit complete?"+(next&&sched&&sched.active?"\n\nThe next visit will be scheduled for "+fmtDate(next)+".":""))) return;
  S.busy=true; render();
  try{
    await sbPatch("cp_requests","id=eq."+r.id,{ status:"No action needed", last_action_date:today() });
    await sbPost("cp_updates",{ request_id:r.id, update_date:today(), status:"No action needed", note:"Recurring visit completed", author:S.persona.name, public_summary:"Visit completed." });
    if(sched && sched.active && next){
      await spawnRecurringCard(sched, next);
      await sbPatch("cp_recurring","id=eq."+sched.id,{ next_due:next });
    }
    toast(next&&sched&&sched.active?("Visit done — next one set for "+fmtDate(next)+"."):"Visit completed."); S.selectedId=null; S.busy=false; await load();
  }catch(e){ toast("Couldn't complete the visit. Try again.",false); S.busy=false; render(); }
}
async function load() {

}

  const dt=(a,b)=>a<b?-1:a>b?1:0;

const fmtTs = ts => { try { return new Date(ts).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); } catch(e){ return ts; } };

const fmtDate = d => { if(!d) return ""; const p=String(d).slice(0,10).split("-"); return p.length===3 ? p[1]+"-"+p[2]+"-"+p[0].slice(2) : d; };

const bizDays = (from,n) => { const d=new Date(from); let a=0; while(a<n){ d.setDate(d.getDate()+1); const w=d.getDay(); if(w!==0&&w!==6)a++; } return d.toISOString().slice(0,10); };
const QUICK = {

async function quick(r,key){

  const patch={ status:q.status, first_touched_at:r.first_touched_at||today(), last_action_date:today() };

// Print the currently-showing follow-up list as a clean sheet (respects Mine/Everyone + status filter).
function printSheet(){
  const p=S.persona, f=S.filter;
  let list=S.rows.filter(r=> f==="All"?true : f==="Open"?OPEN_STATUSES.includes(r.status) : f==="Closed"?!OPEN_STATUSES.includes(r.status) : r.status===f);
  list=list.filter(inScope);
  list=list.slice().sort((a,b)=>((a.next_follow_up||"9999-99-99")<(b.next_follow_up||"9999-99-99")?-1:1));
  const showWho=S.scope==="everyone";
  const rowsHtml=list.map(r=>{
    const od=r.next_follow_up&&r.next_follow_up<today()&&OPEN_STATUSES.includes(r.status);
    return `<tr>
      <td class="chk">&#9744;</td>
      <td><b>${esc(r.customer_name)}</b><div class="sub">${esc(r.branch)}${showWho?' · '+esc(r.assigned_to):''}</div></td>
      <td>${esc(r.phone||r.email||'—')}</td>
      <td>${esc(r.status)}</td>
      <td class="${od?'od':''}">${r.next_follow_up?esc(fmtDate(r.next_follow_up))+(od?' (overdue)':''):'—'}</td>
      <td>${esc(r.follow_up_topic||r.public_summary||'')}</td>
    </tr>`;
  }).join("");
  const title=(S.scope==="mine"?esc(p.name)+" — ":S.scope==="unassigned"?"Unassigned — ":"Team — ")+esc(f)+" follow-ups";
  const css="body{font-family:system-ui,-apple-system,sans-serif;margin:28px;color:#111}h1{font-size:18px;margin:0 0 2px}.m{color:#666;font-size:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;border-bottom:2px solid #111;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}td{border-bottom:1px solid #ddd;padding:9px 8px;vertical-align:top}.chk{font-size:18px;width:22px}.sub{color:#666;font-size:11px;margin-top:2px}.od{color:#c00;font-weight:bold}.empty{color:#666;font-style:italic;margin-top:20px}@media print{body{margin:0}}";
  const table=list.length? `<table><thead><tr><th>Done</th><th>Customer</th><th>Phone / email</th><th>Status</th><th>Follow-up</th><th>Topic</th></tr></thead><tbody>${rowsHtml}</tbody></table>` : `<div class="empty">Nothing to print for this view.</div>`;
  const w=window.open("","_blank");
  if(!w){ toast("Allow pop-ups to print the sheet.",false); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title><style>${css}</style></head><body><h1>${title}</h1><div class="m">Printed ${today()} · ${list.length} item${list.length===1?'':'s'}</div>${table}<scr`+`ipt>window.onload=function(){window.print();}</scr`+`ipt></body></html>`);
  w.document.close();
}

      <div class="av ${mgr?'mgr':'sales'}">${esc(init)}</div>

}

function opts(arr, sel){ return arr.map(o=>`<option ${o===sel?"selected":""}>${esc(o)}</option>`).join(""); }
// Sales can't pick "New" (it's the counter's opening state). If a record is still New,
// The detailed touch form only advances in-progress statuses. Won/Lost/Close
// happen via quick actions, so they're not selectable here — but if a lead is
// already at one of those (or New), we show it as a locked "current" marker.
function statusOptions(current){
  const forward = ["Assigned","Contacted","Visited","Quote pending","Needs more info"];
  const head = forward.includes(current) ? "" : `<option value="${esc(current)}" selected disabled>${esc(stLabel(current))} (current)</option>`;
  return head + forward.map(s=>`<option ${s===current?"selected":""}>${esc(s)}</option>`).join("");
}

  : r.source==='Project' ? `<span style="font-size:11px;font-weight:600;color:#6d28d9;background:#ede9fe;padding:1px 8px;border-radius:999px">Project</span>`
  : r.source==='Recurring visit' ? `<span style="font-size:11px;font-weight:600;color:#0f766e;background:#ccfbf1;padding:1px 8px;border-radius:999px">Recurring visit</span>`
  : `<span style="font-size:11px;font-weight:600;color:#b91c1c;background:#fee2e2;padding:1px 8px;border-radius:999px">Sales call request</span>`;
function subCard(r){
  const hi = r.urgency==='High' && OPEN_STATUSES.includes(r.status);
  return `<button class="subcard${hi?' hipri':''}" data-open="${r.id}" style="border-top:4px solid ${stageColor(r.status)}">
    <div class="cn">${esc(r.customer_name)}</div>

    <div class="kv"><b>Rep:</b> ${r.assigned_to==='Unassigned'?'Unassigned':esc(r.assigned_to)}</div>
    <div class="kv"><b>Action:</b> ${esc(r.suggested_action)}</div>
    <div class="rsn">${esc(r.reason)}</div>
  </button>`;
}
function salesCard(r){
  const age=days(r.submitted_at,today());
  const stale=OPEN_STATUSES.includes(r.status)&&age>5;
  const hasNote=commentsFor(r.id).some(isMgrNote);
  const hi = r.urgency==='High' && OPEN_STATUSES.includes(r.status);
  return `<button class="subcard${hi?' hipri':''}" data-open="${r.id}" style="border-top:4px solid ${stageColor(r.status)}">
    <div class="cn">${esc(r.customer_name)}</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">
      ${pill(r.status)}
      <span class="urg"><span class="udot" style="background:${r.urgency==='High'?'#f43f5e':r.urgency==='Medium'?'#f59e0b':'#94a3b8'}"></span>${esc(r.urgency)}</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">
      ${stale?`<span class="aging">${I.warn}${age}d aging</span>`:""}
      ${sourceBadge(r)}
      ${hasNote?`<span style="font-size:11px;font-weight:600;color:#9f1239;background:#fde2e5;padding:1px 7px;border-radius:999px">Manager note</span>`:""}
    </div>
    <div class="kv"><b>Rep:</b> ${r.assigned_to==='Unassigned'?'Unassigned':esc(r.assigned_to)}</div>
    <div class="kv"><b>Submitted by:</b> ${esc(r.submitted_by)} · ${fmtDate(r.submitted_at)}</div>
    <div class="kv"><b>${esc(r.category)}</b>${r.source!=='Field call'?` · ${esc(r.suggested_action)}`:''}</div>
    <div class="rsn">${esc(r.reason)}</div>
  </button>`;
}

function viewNotes(){
  const nf=S.noteFilter||"needs";
  const nscope=S.noteScope || (S.persona.type==="sales"?"mine":"everyone");
  let data=cardsWithNotes();
  if(nscope==="mine") data=data.filter(x=>x.r.assigned_to===S.persona.name);
  if(nf==="needs") data=data.filter(x=>x.status==="needs");
  else if(nf==="addressed") data=data.filter(x=>x.status==="addressed");
  data.sort((a,b)=> (a.status===b.status?0:a.status==="needs"?-1:1) || (b.last.created_at>a.last.created_at?1:-1));
  const seg=[["needs","Needs reply"],["addressed","Replied"],["all","All"]].map(([k,l])=>`<button data-notefilter="${k}" class="${nf===k?'active':''}">${l}</button>`).join("");
  const scopeSeg=[["mine","Mine"],["everyone","Everyone"]].map(([k,l])=>`<button data-notescope="${k}" class="${nscope===k?'active':''}">${l}</button>`).join("");
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
    <div class="modeseg">${seg}</div>
    <div class="modeseg">${scopeSeg}</div>
  </div>
  <div class="tiny muted" style="margin-bottom:10px">Manager notes on ${nscope==='mine'?'your':'all'} leads. “Needs reply” means the manager had the last word — reply or mark it addressed to close the loop.</div>

}
function viewMine() {

  const base = everyone ? S.rows : S.rows.filter(r=>r.submitted_by===S.persona.name);
  const mf = S.mineFilter;
  let list = base.filter(r => mf==="All"?true : mf==="Open"?OPEN_STATUSES.includes(r.status) : !OPEN_STATUSES.includes(r.status));
  if(S.search) list = list.filter(r=>matchSearch(r,S.search));
  list = sortList(list);

  const emptyMsg = S.search
    ? empty(I.search,"No matches","Nothing matches “"+esc(S.search)+"”. Try fewer letters, or clear the search.")

      ? empty(I.clip, mf==="Closed"?"Nothing closed yet":"Nothing open right now","Try a different filter above to see the rest.")

          <div class="tiny muted" style="margin-top:4px">${esc(r.category)} · ${esc(r.branch)} · submitted ${esc(fmtDate(r.submitted_at))}</div></div>

        </div>
        <div class="grid2" style="margin-bottom:20px">
          <div class="info"><div class="k">Assigned to</div><div class="v">${r.assigned_to==='Unassigned'?'Not yet assigned':esc(r.assigned_to)}</div></div>
          <div class="info"><div class="k">Last update</div><div class="v">${r.last_action_date?esc(fmtDate(r.last_action_date)):'—'}</div></div>
        </div>
        <div class="tiny" style="font-weight:600;color:#64748b;margin-bottom:8px">Progress updates <span class="muted" style="font-weight:400">— what sales has shared, newest first</span></div>
        ${(()=>{ const pt=updatesFor(r.id).filter(u=>u.public_summary).reverse();
          return pt.length?`<div class="stack" style="margin-bottom:20px">${pt.map(u=>`<div class="touch" style="border-left-color:#0d9488">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${pill(u.status)}<span class="tiny muted">${esc(fmtDateTime(u.created_at,u.update_date))}</span></div>
            <div style="font-size:14px;color:#334155;margin-top:5px">${esc(u.public_summary)}</div>
            ${u.products_discussed?`<div class="tbits"><span class="tbit">Products: ${esc(u.products_discussed)}</span></div>`:""}
          </div>`).join("")}</div>`
          :'<div class="softbox" style="margin-bottom:20px"><div style="font-size:14px;color:#64748b">Sales hasn\'t posted an update yet. You\'ll see progress here as it moves.</div></div>'; })()}
        <div style="display:flex;align-items:center;gap:4px">${track}</div>

  const viewToggle = `<div class="modeseg"><button data-salesview="cards" class="${view==='cards'?'active':''}">Cards</button><button data-salesview="calendar" class="${view==='calendar'?'active':''}">Calendar</button><button data-salesview="notes" class="${view==='notes'?'active':''}">Manager notes${needsCount?`<span class="segcount">${needsCount}</span>`:''}</button></div>`;
  if(view==="calendar"){
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <h1 class="page">Sales follow-up dashboard</h1>

    </div>
    ${viewCalendar()}`;
  }

    return `

      <h1 class="page">Sales follow-up dashboard</h1>
      ${viewToggle}
    </div>

  const emSub = S.scope==='mine'?"Nothing assigned to you in this filter. Enjoy the quiet — or check Unassigned for something to grab."
    :S.scope==='unassigned'?"No unassigned leads in this filter — the grab pile's empty."
    :"No requests match this filter. Flip to All to see everything.";

        ${viewToggle}
        <div class="filters">${scopes.map(([v,l])=>`<button data-scope="${v}" class="${S.scope===v?'active':''}">${l}</button>`).join("")}</div>
        <div class="filters">${fs.map(x=>`<button data-filter="${x}" class="${x===f?'active':''}">${x}</button>`).join("")}</div>

      </div>
    </div>
    ${searchBar("Search customer, account, or salesperson…")}

function calDate(r){
  const open = OPEN_STATUSES.includes(r.status);
  if(open) return r.next_follow_up || r.submitted_at;
  return r.last_action_date || r.next_follow_up || r.submitted_at;
}
function viewCalendar(){
  const now=new Date();
  if(S.calY==null){ S.calY=now.getFullYear(); S.calM=now.getMonth(); }
  const view=S.calView||"month";
  const st=S.calStatus||"open";
  const person=S.calPerson||"Everyone";
  const passes=r=>{ const open=OPEN_STATUSES.includes(r.status); if(st==="open"&&!open)return false; if(st==="completed"&&open)return false; if(person!=="Everyone"&&r.assigned_to!==person)return false; return true; };
  const statusSeg=[["open","Open"],["completed","Completed"],["all","All"]].map(([k,l])=>`<button data-calstatus="${k}" class="${st===k?'active':''}">${l}</button>`).join("");
  const people=["Everyone",...SALESPEOPLE.filter(p=>p!=="Unassigned"),"Unassigned"];
  const personSel=`<select class="sortsel" data-calperson>${people.map(p=>`<option ${p===person?'selected':''}>${esc(p)}</option>`).join("")}</select>`;
  const viewSeg=`<div class="modeseg"><button data-calview="month" class="${view==='month'?'active':''}">Month</button><button data-calview="day" class="${view==='day'?'active':''}">Day</button></div>`;
  const controls=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${viewSeg}<div class="modeseg">${statusSeg}</div>${personSel}</div>`;

  if(view==="day"){
    if(!S.calDay) S.calDay=today();
    const dayCards=S.rows.filter(passes).filter(r=>String(calDate(r)||"").slice(0,10)===S.calDay).sort((a,b)=>((a.assigned_to||"")<(b.assigned_to||"")?-1:1));
    const label=new Date(S.calDay+"T00:00:00").toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const nav=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="qbtn" data-daynav="prev">‹ Prev</button>
      <div style="font-weight:700;font-size:16px;min-width:200px;text-align:center">${label}</div>
      <button class="qbtn" data-daynav="next">Next ›</button>
      <button class="linkish" data-daynav="today" style="margin-left:4px">Today</button>
    </div>`;
    const listHtml = dayCards.length ? `<div class="stack">${dayCards.map(r=>`
      <button class="dayrow" data-open="${r.id}">
        <span class="cdot" style="background:${stageColor(r.status)}"></span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;color:#0f172a;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${esc(r.customer_name)} ${pill(r.status)} ${sourceBadge(r)}</div>
          <div class="tiny muted" style="margin-top:3px">${esc(r.assigned_to||'Unassigned')} · ${esc(r.branch||'')}${r.phone?' · '+esc(r.phone):''}</div>
          ${(r.follow_up_topic||r.public_summary||r.reason)?`<div class="tiny" style="color:#475569;margin-top:3px">${esc(r.follow_up_topic||r.public_summary||r.reason)}</div>`:""}
        </div>
      </button>`).join("")}</div>` : `<div class="tiny muted" style="font-style:italic;padding:20px 0">Nothing scheduled for this day in this filter.</div>`;
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px">
      ${nav}
      ${controls}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div class="tiny muted">${dayCards.length} card${dayCards.length===1?'':'s'} on this day — ${st==='open'?'by follow-up date':st==='completed'?'by completion date':'open & completed'}.</div>
      <button class="qbtn" data-printday="1">${I.printer}Print this day</button>
    </div>
    ${stageLegend()}
    ${listHtml}`;
  }

  const y=S.calY, m=S.calM;
  const byDay={};
  S.rows.filter(passes).forEach(r=>{ const d=calDate(r); if(!d) return; const dt=new Date(String(d).slice(0,10)+"T00:00:00"); if(dt.getFullYear()===y&&dt.getMonth()===m){ const day=dt.getDate(); (byDay[day]=byDay[day]||[]).push(r); } });
  const daysInMonth=new Date(y,m+1,0).getDate();
  const startDow=new Date(y,m,1).getDay();
  const monthName=new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr=today();
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="calcell out"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const items=(byDay[day]||[]);
    const chips=items.slice(0,4).map(r=>`<button class="calchip" data-open="${r.id}"><span class="cdot" style="background:${stageColor(r.status)}"></span><span class="nm">${esc(r.customer_name)}</span></button>`).join("");
    const more=items.length>4?`<button class="linkish" data-calday="${iso}" style="font-size:11px;padding-left:2px">+${items.length-4} more</button>`:"";
    cells+=`<div class="calcell${iso===todayStr?' today':''}"><button class="caldaynum" data-calday="${iso}" title="Open day view">${day}</button>${chips}${more}</div>`;
  }
  const total=Object.values(byDay).reduce((s,a)=>s+a.length,0);
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="qbtn" data-calnav="prev">‹ Prev</button>
      <div style="font-weight:700;font-size:16px;min-width:150px;text-align:center">${monthName}</div>
      <button class="qbtn" data-calnav="next">Next ›</button>
      <button class="linkish" data-calnav="today" style="margin-left:4px">Today</button>
    </div>
    ${controls}
  </div>
  <div class="tiny muted" style="margin-bottom:10px">${total} card${total===1?'':'s'} shown — ${st==='open'?'placed by follow-up date':st==='completed'?'placed by completion date':'open by follow-up, completed by close date'}. Tap a day number for a printable day view.</div>
  ${stageLegend()}
  <div class="calwrap"><div class="calgrid">
    ${dows.map(d=>`<div class="caldow">${d}</div>`).join("")}
    ${cells}
  </div></div>`;
}
function printDay(){
  const st=S.calStatus||"open", person=S.calPerson||"Everyone", day=S.calDay||today();
  const passes=r=>{ const open=OPEN_STATUSES.includes(r.status); if(st==="open"&&!open)return false; if(st==="completed"&&open)return false; if(person!=="Everyone"&&r.assigned_to!==person)return false; return true; };
  const list=S.rows.filter(passes).filter(r=>String(calDate(r)||"").slice(0,10)===day).sort((a,b)=>((a.assigned_to||"")<(b.assigned_to||"")?-1:1));
  const label=new Date(day+"T00:00:00").toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const rowsHtml=list.map(r=>`<tr>
    <td class="chk">&#9744;</td>
    <td><b>${esc(r.customer_name)}</b><div class="sub">${esc(r.branch||'')}${person==='Everyone'?' · '+esc(r.assigned_to||'Unassigned'):''}</div></td>
    <td>${esc(r.phone||r.email||'—')}</td>
    <td>${esc(stLabel(r.status))}</td>
    <td>${esc(r.follow_up_topic||r.public_summary||r.reason||'')}</td>
  </tr>`).join("");
  const who = person==="Everyone" ? "Team" : esc(person);
  const title=`${who} — ${label}`;
  const css="body{font-family:system-ui,-apple-system,sans-serif;margin:28px;color:#111}h1{font-size:18px;margin:0 0 2px}.m{color:#666;font-size:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;border-bottom:2px solid #111;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}td{border-bottom:1px solid #ddd;padding:9px 8px;vertical-align:top}.chk{font-size:18px;width:22px}.sub{color:#666;font-size:11px;margin-top:2px}.empty{color:#666;font-style:italic;margin-top:20px}@media print{body{margin:0}}";
  const table=list.length? `<table><thead><tr><th>Done</th><th>Customer</th><th>Phone / email</th><th>Status</th><th>What to do</th></tr></thead><tbody>${rowsHtml}</tbody></table>` : `<div class="empty">Nothing scheduled for this day.</div>`;
  const w=window.open("","_blank");
  if(!w){ toast("Allow pop-ups to print the day.",false); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title><style>${css}</style></head><body><h1>${title}</h1><div class="m">Printed ${today()} · ${list.length} stop${list.length===1?'':'s'}</div>${table}<scr`+`ipt>window.onload=function(){window.print();}</scr`+`ipt></body></html>`);
  w.document.close();
}

function info(k,v){ return `<div class="info"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`; }
function touchTimeline(u){
  const bits=[];
  if(u.products_discussed) bits.push(`<span class="tbit">Products: ${esc(u.products_discussed)}</span>`);
  if(u.quote_number||Number(u.quoted_value)) bits.push(`<span class="tbit">Quote ${esc(u.quote_number||'')}${Number(u.quoted_value)?' · $'+Number(u.quoted_value).toLocaleString():''}</span>`);
  if(u.order_number||Number(u.ordered_value)) bits.push(`<span class="tbit">Order ${esc(u.order_number||'')}${Number(u.ordered_value)?' · $'+Number(u.ordered_value).toLocaleString():''}</span>`);
  if(u.follow_up_topic) bits.push(`<span class="tbit">Covered: ${esc(u.follow_up_topic)}</span>`);
  if(u.contact_type){
    return `<div class="touch">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="ttype">${esc(u.contact_type)}</span>${u.status?pill(u.status):""}
        <span class="tiny muted">${esc(fmtDateTime(u.created_at,u.update_date))}${u.author?' · '+esc(u.author):''}</span>
      </div>
      ${u.note?`<div style="font-size:14px;color:#334155;margin-top:5px">${esc(u.note)}</div>`:""}
      ${bits.length?`<div class="tbits">${bits.join("")}</div>`:""}
      ${u.public_summary?`<div class="tiny" style="margin-top:6px;color:#64748b"><b>Shared with customer:</b> ${esc(u.public_summary)}</div>`:""}
    </div>`;
  }
  return `<div class="note"><div class="tiny muted" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${esc(fmtDateTime(u.created_at,u.update_date))} ${u.status?pill(u.status):""}${u.author?'<span>· '+esc(u.author)+'</span>':''}</div><div style="font-size:13px;color:#475569;margin-top:2px">${esc(u.note||'')}</div></div>`;
}
function empty(icon,t,b){ return `<div class="empty">${icon}<div style="font-weight:600;color:#334155;margin-top:12px">${t}</div><div class="tiny muted" style="margin-top:4px">${b}</div></div>`; }

function viewManager() {
  const rows = S.rows;
  const open = rows.filter(r=>OPEN_STATUSES.includes(r.status));
  const won = rows.filter(r=>r.status==="Won");
  const openIds = new Set(open.map(r=>r.id));
  const pipeline = S.updates.filter(u=>openIds.has(u.request_id)).reduce((s,u)=>s+(Number(u.quoted_value)||0),0);
  const touched = rows.filter(r=>r.first_touched_at);
  const avg = touched.length?(touched.reduce((s,r)=>s+days(r.submitted_at,r.first_touched_at),0)/touched.length).toFixed(1):"—";
  const byBranch = BRANCHES.map(b=>({b,n:rows.filter(r=>r.branch===b).length}));
  const maxB = Math.max(1,...byBranch.map(x=>x.n));
  const aging = open.map(r=>({...r,age:days(r.submitted_at,today())})).sort((a,b)=>b.age-a.age);
  const repeats = Object.entries(rows.reduce((m,r)=>{const k=r.customer_name.toLowerCase();m[k]=(m[k]||0)+1;return m;},{})).filter(([,n])=>n>1);
  const unassigned = open.filter(r=>r.assigned_to==='Unassigned').length;
  const overdue = open.filter(r=>r.next_follow_up && r.next_follow_up < today()).length;
  const aging5 = open.filter(r=>days(r.submitted_at,today())>5).length;
  const attn=(n,label,sub,jump)=>{const good=n===0;return good
    ? `<div class="attncard ok"><div class="an">${n}</div><div class="al">${label}</div><div class="as">all clear</div></div>`
    : `<div class="attncard bad" data-mgr-jump="${jump}" style="cursor:pointer"><div class="an">${n}</div><div class="al">${label}</div><div class="as">${sub}</div><div class="tiny" style="margin-top:6px;font-weight:600;opacity:.85">View →</div></div>`;};
  const allClear = unassigned===0 && overdue===0 && aging5===0;
  const quotedTotal = S.updates.reduce((s,u)=>s+(Number(u.quoted_value)||0),0);
  const orderedTotal = S.updates.reduce((s,u)=>s+(Number(u.ordered_value)||0),0);
  const hitRate = quotedTotal>0 ? Math.round(orderedTotal/quotedTotal*100)+"%" : "—";
  const money = n => "$"+Math.round(n/1000)+"k";
  const fromField = rows.filter(r=>r.source==='Field call').length;
  const fromCounter = rows.length - fromField;
  const stat=(k,v,s,color)=>`<div class="card stat"><div class="k">${k}</div><div class="v" style="${color||''}">${v}</div>${s?`<div class="s">${s}</div>`:''}</div>`;

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h1 class="page">Manager view</h1>
      <button class="filters" data-refresh style="border:1px solid #e2e8f0;padding:6px 12px;color:#64748b;font-size:12px;display:inline-flex;align-items:center;gap:6px;background:#fff">${I.refresh} Refresh</button>
    </div>
    <div style="margin-bottom:8px;display:flex;align-items:baseline;gap:8px">
      <span style="font-size:13px;font-weight:600;color:#334155">Needs attention right now</span>
      ${allClear?'<span class="tiny" style="color:#16a34a;font-weight:600">— board is healthy</span>':'<span class="tiny muted">— zero across the board means a healthy shop</span>'}
    </div>
    <div class="attn">
      ${attn(unassigned,"Unassigned","nobody owns these yet","unassigned")}
      ${attn(overdue,"Overdue follow-ups","the promised date has passed","overdue")}
      ${attn(aging5,"Aging 5+ days","open and sitting too long","aging")}
    </div>
    <div class="stats" style="margin-bottom:20px">
      ${stat("Total submitted",rows.length)}
      ${stat("Open items",open.length,"",open.length>3?"color:#d97706":"")}
      ${stat("Won",won.length,"","color:#16a34a")}
      ${stat("Avg response",avg==="—"?"—":avg+"d","submit → first touch")}
      ${stat("Live pipeline","$"+Math.round(pipeline/1000)+"k","quoted on open leads")}
    </div>
    <div style="font-size:13px;font-weight:600;color:#334155;margin:0 0 8px">Deal flow</div>
    <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px">
      ${stat("Quoted",money(quotedTotal),"total value quoted")}
      ${stat("Ordered",money(orderedTotal),"total value booked","color:#16a34a")}
      ${stat("Quote → order",hitRate,"of quoted $ converted")}
    </div>
    <div class="grid2" style="gap:20px">
      <div class="card">
        <h2 style="font-size:16px;font-weight:600;margin:0 0 16px;display:flex;align-items:center;gap:8px"><span style="color:#94a3b8;display:inline-flex">${I.bldg}</span> Submissions by branch</h2>
        <div class="stack">${byBranch.map(({b,n})=>`<div style="display:flex;align-items:center;gap:12px"><span class="tiny" style="width:96px;color:#475569">${b}</span><div class="bar"><div style="width:${(n/maxB)*100}%;min-width:${n?28:0}px">${n||""}</div></div></div>`).join("")}</div>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9">
          <h3 style="font-size:14px;font-weight:600;color:#334155;margin:0 0 8px;display:flex;align-items:center;gap:6px"><span style="color:#94a3b8;display:inline-flex">${I.trend}</span>Repeat customers</h3>
          ${repeats.length===0?'<p class="tiny muted" style="margin:0">No customer flagged more than once yet. When they are, they show here — that\'s your early-warning list.</p>':
            `<div class="stack" style="--x:0">${repeats.map(([n,c])=>`<div style="display:flex;justify-content:space-between;font-size:14px;color:#475569"><span style="text-transform:capitalize">${esc(n)}</span><span style="color:#e11d48;font-weight:500">${c}×</span></div>`).join("")}</div>`}
        </div>
        <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f1f5f9">
          <h3 style="font-size:14px;font-weight:600;color:#334155;margin:0 0 10px">Where leads come from</h3>
          <div style="display:flex;gap:10px">
            <div style="flex:1;background:#fef2f4;border:1px solid #fde2e5;border-radius:10px;padding:10px 12px"><div style="font-size:20px;font-weight:700;color:#0f172a">${fromCounter}</div><div class="tiny muted">from the counter</div></div>
            <div style="flex:1;background:#eff4ff;border:1px solid #dbeafe;border-radius:10px;padding:10px 12px"><div style="font-size:20px;font-weight:700;color:#0f172a">${fromField}</div><div class="tiny muted">from the field</div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2 style="font-size:16px;font-weight:600;margin:0 0 16px;display:flex;align-items:center;gap:8px"><span style="color:#94a3b8;display:inline-flex">${I.clock}</span> Open items, oldest first</h2>
        ${aging.length===0?'<p class="muted" style="font-size:14px">Nothing open. Clean board.</p>':
          `<div>${aging.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #f8fafc">
            <div style="min-width:0"><div style="font-size:14px;font-weight:500;color:#334155">${esc(r.customer_name)}</div><div class="tiny muted">${esc(r.branch)} · ${r.assigned_to==='Unassigned'?'unassigned':esc(r.assigned_to)}${(r.next_follow_up&&r.next_follow_up<today())?' · <span style="color:#e11d48;font-weight:600">follow-up overdue</span>':''}</div></div>
            <div style="display:flex;align-items:center;gap:8px">${pill(r.status)}<span style="font-size:12px;font-weight:600;width:44px;text-align:right;color:${r.age>5?'#e11d48':'#94a3b8'}">${r.age}d</span></div>
          </div>`).join("")}</div>`}
        <p class="tiny muted" style="margin-top:12px">Anything red has been sitting more than 5 days. That's the "someone should call them" pile — now it's visible.</p>
      </div>
      ${(()=>{ const who=S.mgrNoteWho||"mine"; const nf=S.mgrNoteFilter||"needs"; const name=S.persona.name;
        let data=managerNoteData(who, name);
        const wait=data.filter(x=>x.status==="needs").length;
        if(nf==="needs") data=data.filter(x=>x.status==="needs"); else if(nf==="addressed") data=data.filter(x=>x.status==="addressed");
        data.sort((a,b)=> (a.status===b.status?0:a.status==="needs"?-1:1) || (b.last.created_at>a.last.created_at?1:-1));
        const whoSeg=[["mine","My notes"],["all","All managers"]].map(([k,l])=>`<button data-mgrnotewho="${k}" class="${who===k?'active':''}">${l}</button>`).join("");
        const seg=[["needs","Awaiting reply"],["addressed","Replied"],["all","All"]].map(([k,l])=>`<button data-mgrnotefilter="${k}" class="${nf===k?'active':''}">${l}</button>`).join("");
        return `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
            <div><h2 style="font-size:16px;font-weight:600;margin:0">Notes you're waiting on</h2>
            <div class="tiny muted" style="margin-top:2px">${who==="mine"?`${wait} of your note${wait===1?'':'s'} still awaiting a reply from sales.`:`${wait} team note${wait===1?'':'s'} still awaiting a reply.`}</div></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap"><div class="modeseg">${whoSeg}</div><div class="modeseg">${seg}</div></div>
          </div>
          ${data.length?`<div class="stack">${data.map(x=>noteRow(x,'manager')).join("")}</div>`:`<div class="tiny muted" style="font-style:italic;padding:16px 0">${who==="mine"&&nf==="needs"?"Nothing waiting on you — you're all caught up. 🎉":"Nothing in this filter."}</div>`}
        </div>`; })()}
      ${(()=>{ const act=(S.recurring||[]).filter(s=>s.active); return act.length?`
      <div class="card">
        <h2 style="font-size:16px;font-weight:600;margin:0 0 4px">Recurring visits</h2>
        <div class="tiny muted" style="margin-bottom:14px">Active schedules — the next visit is scheduled when the rep completes the last one. “Next due” is the current target.</div>
        ${act.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f8fafc">
          <div style="min-width:0"><div style="font-size:14px;font-weight:600;color:#334155">${esc(s.customer_name)} <span style="font-size:11px;font-weight:600;color:#0f766e;background:#ccfbf1;padding:1px 8px;border-radius:999px;margin-left:4px">every ${esc(s.cadence_value)} ${esc(s.cadence_unit)}</span></div>
          <div class="tiny muted">${esc(s.assigned_to||'Unassigned')} · ${esc(s.branch||'')} · next due ${fmtDate(s.next_due)}</div></div>
          <button class="linkish" data-recur-off="${s.id}" style="color:#dc2626">Stop</button>
        </div>`).join("")}
      </div>`:""; })()}
    </div>`;
}

// ---- Events -----------------------------------------------------------
function bind() {
  document.querySelectorAll("[data-persona]").forEach(b=>b.onclick=()=>{ S.persona=PERSONAS.find(p=>p.id===b.dataset.persona); S.selectedId=null; S.search=""; S.subScope="mine"; S.scope=S.persona.type==="sales"?"mine":"everyone"; S.filter="Open"; S.special=null; if(S.persona.type==="employee"&&!["submit","mine"].includes(S.tab))S.tab="submit"; render(); });
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; S.selectedId=null; S.search=""; S.special=null; render(); });
  const qs=document.querySelector("[data-search]"); if(qs) qs.oninput=()=>{ S.search=qs.value; S._focus="q_search"; render(); };
  const qc=document.querySelector("[data-clearsearch]"); if(qc) qc.onclick=()=>{ S.search=""; S._focus="q_search"; render(); };
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ S.selectedId=b.dataset.open; render(); });
  document.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>{ S.selectedId=null; render(); });
  document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{ S.filter=b.dataset.filter; S.special=null; render(); });
  document.querySelectorAll("[data-minefilter]").forEach(b=>b.onclick=()=>{ S.mineFilter=b.dataset.minefilter; render(); });
  document.querySelectorAll("[data-subscope]").forEach(b=>b.onclick=()=>{ S.subScope=b.dataset.subscope; render(); });
  const so=document.querySelector("[data-sort]"); if(so) so.onchange=()=>{ S.sort=so.value; render(); };
  const rf=document.querySelector("[data-refresh]"); if(rf) rf.onclick=()=>{ load(); toast("Refreshed from database."); };
  const cl=document.querySelector("[data-changelog]"); if(cl) cl.onclick=openChangelog;
  document.querySelectorAll("[data-modal-close]").forEach(b=>b.onclick=closeChangelog);
  const ov=document.querySelector("[data-modal-overlay]"); if(ov) ov.onclick=(e)=>{ if(e.target===ov) closeChangelog(); };
  document.querySelectorAll("[data-quick]").forEach(b=>b.onclick=()=>quick(S.rows.find(x=>x.id===S.selectedId), b.dataset.quick));
  document.querySelectorAll("[data-scope]").forEach(b=>b.onclick=()=>{ S.scope=b.dataset.scope; S.special=null; render(); });
  document.querySelectorAll("[data-salesview]").forEach(b=>b.onclick=()=>{ S.salesView=b.dataset.salesview; render(); });
  document.querySelectorAll("[data-calnav]").forEach(b=>b.onclick=()=>{
    const now=new Date();
    if(b.dataset.calnav==="today"){ S.calY=now.getFullYear(); S.calM=now.getMonth(); }
    else { let mm=S.calM+(b.dataset.calnav==="next"?1:-1), yy=S.calY; if(mm<0){mm=11;yy--;} if(mm>11){mm=0;yy++;} S.calM=mm; S.calY=yy; }
    render();
  });
  document.querySelectorAll("[data-calstatus]").forEach(b=>b.onclick=()=>{ S.calStatus=b.dataset.calstatus; render(); });
  document.querySelectorAll("[data-calview]").forEach(b=>b.onclick=()=>{ S.calView=b.dataset.calview; render(); });
  document.querySelectorAll("[data-calday]").forEach(b=>b.onclick=()=>{ S.calDay=b.dataset.calday; S.calView="day"; render(); });
  document.querySelectorAll("[data-daynav]").forEach(b=>b.onclick=()=>{
    if(b.dataset.daynav==="today"){ S.calDay=today(); }
    else { const d=new Date((S.calDay||today())+"T00:00:00"); d.setDate(d.getDate()+(b.dataset.daynav==="next"?1:-1)); S.calDay=d.toISOString().slice(0,10); }
    render();
  });
  const pd=document.querySelector("[data-printday]"); if(pd) pd.onclick=printDay;
  document.querySelectorAll("[data-notefilter]").forEach(b=>b.onclick=()=>{ S.noteFilter=b.dataset.notefilter; render(); });
  document.querySelectorAll("[data-notescope]").forEach(b=>b.onclick=()=>{ S.noteScope=b.dataset.notescope; render(); });
  document.querySelectorAll("[data-mgrnotefilter]").forEach(b=>b.onclick=()=>{ S.mgrNoteFilter=b.dataset.mgrnotefilter; render(); });
  document.querySelectorAll("[data-mgrnotewho]").forEach(b=>b.onclick=()=>{ S.mgrNoteWho=b.dataset.mgrnotewho; render(); });
  document.querySelectorAll("[data-noteopen]").forEach(b=>b.onclick=()=>{ S.tab="sales"; S.selectedId=b.dataset.noteopen; render(); });
  const cv=document.querySelector("[data-complete-visit]"); if(cv) cv.onclick=()=>completeVisit(S.rows.find(x=>x.id===S.selectedId));
  const ma=document.querySelector("[data-markaddressed]"); if(ma) ma.onclick=markAddressed;
  const cperson=document.querySelector("[data-calperson]"); if(cperson) cperson.onchange=()=>{ S.calPerson=cperson.value; render(); };
  const pr=document.querySelector("[data-print]"); if(pr) pr.onclick=printSheet;
  const cpost=document.getElementById("c_post"); if(cpost) cpost.onclick=postComment;
  const asg=document.querySelector("[data-assign]"); if(asg) asg.onclick=()=>assignSelf(S.rows.find(x=>x.id===S.selectedId));
  const del=document.querySelector("[data-delete]"); if(del) del.onclick=()=>deleteCard(S.rows.find(x=>x.id===S.selectedId));
  const al=document.querySelector("[data-assign-lead]"); if(al) al.onchange=()=>assignLead(S.rows.find(x=>x.id===S.selectedId), al.value);
  const ph=document.getElementById("s_phone"); if(ph) ph.onblur=()=>{ ph.value=fmtPhone(ph.value); };
  document.querySelectorAll("[data-dateset]").forEach(b=>b.onclick=()=>{ const el=document.getElementById(b.dataset.dateset); if(el) el.value=dateShortcut(b.dataset.datekey); });
  document.querySelectorAll("[data-scroll]").forEach(b=>b.onclick=()=>{ const el=document.getElementById(b.dataset.scroll); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); });
  document.querySelectorAll("[data-mgr-jump]").forEach(b=>b.onclick=()=>{ S.special=b.dataset.mgrJump; S.tab="sales"; S.selectedId=null; S.scope="everyone"; render(); });
  const cs=document.querySelector("[data-clearspecial]"); if(cs) cs.onclick=()=>{ S.special=null; render(); };
  document.querySelectorAll("[data-recur-off]").forEach(b=>b.onclick=async()=>{
    const s=(S.recurring||[]).find(x=>x.id===b.dataset.recurOff); if(!s) return;
    if(!confirm("Stop the recurring visits for "+s.customer_name+"? Existing cards stay; no new ones will be created.")) return;
    S.busy=true; render();
    try{ await sbPatch("cp_recurring","id=eq."+s.id,{active:false}); toast("Recurring visits stopped."); S.busy=false; await load(); }
    catch(e){ toast("Couldn't stop it. Try again.",false); S.busy=false; render(); }
  });

  const sb=document.getElementById("s_submit");
  if(sb) sb.onclick=async()=>{
    const g=id=>document.getElementById(id).value.trim();
    const field=S.persona.type!=="employee";
    const base={ submitted_by:S.persona.name, customer_name:g("s_customer"), account_number:g("s_account")||null, contact_name:g("s_contact")||null, phone:g("s_phone")||null, email:g("s_email")||null, branch:document.getElementById("s_branch").value, suggested_action:document.getElementById("s_action").value, category:document.getElementById("s_category").value, urgency:document.getElementById("s_urgency").value, reason:g("s_reason") };
    if(!base.customer_name||!base.reason){ toast("Customer name and the details are required.",false); return; }
    const payload = field
      ? { ...base, source:"Field call", assigned_to:S.persona.name, status:document.getElementById("s_status").value, next_follow_up:document.getElementById("s_next").value||null, follow_up_topic:g("s_topic")||null, first_touched_at:today(), last_action_date:today() }
      : { ...base, source:"Counter" };
    S.busy=true; render();
    try{
      await sbPost("cp_requests",payload);
      toast(field?"Field call logged — it's in your pipeline.":"Request submitted — sales can see it now.");
      if(field){ S.tab="sales"; S.scope="mine"; } else { S.tab="mine"; }
      S.busy=false; await load();
    }catch(e){ toast(field?"Couldn't log the call. Try again.":"Submit failed. Try again.",false); S.busy=false; render(); }
  };

  document.querySelectorAll("[data-submode]").forEach(b=>b.onclick=()=>{ S.submitMode=b.dataset.submode; render(); });

  const rb=document.getElementById("r_submit");
  if(rb) rb.onclick=async()=>{
    const g=id=>document.getElementById(id).value.trim();
    const customer=g("r_customer"), first=document.getElementById("r_first").value, note=g("r_note");
    if(!customer||!first||!note){ toast("Customer, first visit date, and the visit note are required.",false); return; }
    const row={ customer_name:customer, account_number:g("r_account")||null, contact_name:g("r_contact")||null, phone:g("r_phone")||null,
      branch:document.getElementById("r_branch").value, assigned_to:document.getElementById("r_assigned").value,
      cadence_value:Number(document.getElementById("r_cadval").value)||4, cadence_unit:document.getElementById("r_cadunit").value,
      next_due:first, note:note, active:true, created_by:S.persona.name };
    S.busy=true; render();
    try{
      const res=await sbPost("cp_recurring",row);
      const sched=Array.isArray(res)?res[0]:res;
      if(sched) await spawnRecurringCard(sched, first);
      toast("Recurring visit scheduled — first card is on the board."); S.tab="sales"; S.scope="everyone"; S.busy=false; await load();
    }
    catch(e){ toast("Couldn't schedule. Try again.",false); S.busy=false; render(); }
  };

  const pb=document.getElementById("p_submit");
  if(pb) pb.onclick=async()=>{
    const g=id=>document.getElementById(id).value.trim();
    const customer=g("p_customer"), reason=g("p_reason"), assigned=document.getElementById("p_assigned").value;
    if(!customer||!reason){ toast("Project name and what you're monitoring are required.",false); return; }
    const payload={ submitted_by:S.persona.name, customer_name:customer, account_number:g("p_account")||null, contact_name:g("p_contact")||null, phone:g("p_phone")||null,
      branch:document.getElementById("p_branch").value, suggested_action:"Visit", category:"Large job / project", urgency:"Medium", reason:reason,
      source:"Project", assigned_to:assigned, status:(assigned&&assigned!=="Unassigned")?"Assigned":"New",
      next_follow_up:document.getElementById("p_next").value||null, first_touched_at:null, last_action_date:today() };
    S.busy=true; render();
    try{ await sbPost("cp_requests",payload); toast("Project created — it's on the board."); S.tab="sales"; S.scope="everyone"; S.busy=false; await load(); }
    catch(e){ toast("Couldn't create the project. Try again.",false); S.busy=false; render(); }
  };

  const us=document.getElementById("u_save");
  if(us) us.onclick=async()=>{
    const r=S.rows.find(x=>x.id===S.selectedId);
    const gv=id=>document.getElementById(id).value.trim();
    const nv=id=>Number(document.getElementById(id).value)||0;
    const type=document.getElementById("u_type").value;
    const status=TOUCH_MAP[type]||r.status;
    const note=gv("u_note");
    const next=document.getElementById("u_next").value||null;
    const pub=gv("u_public");
    const products=gv("u_products")||null;
    const topic=gv("u_topic")||null;
    const quoteno=gv("u_quoteno")||null, quoted=nv("u_quoted");
    const orderno=gv("u_orderno")||null, ordered=nv("u_ordered");
    const first_touched_at=r.first_touched_at||today();
    S.busy=true; render();
    try{
      // 1. append the touch (never overwrites earlier ones)
      await sbPost("cp_updates",{ request_id:r.id, update_date:today(), contact_type:type, status, note:note||null, author:S.persona.name,
        products_discussed:products, follow_up_topic:topic, quote_number:quoteno, quoted_value:quoted, order_number:orderno, ordered_value:ordered, public_summary:pub||null });
      // 2. update the lead's current snapshot (ownership is set separately, at the lead level)
      await sbPatch("cp_requests","id=eq."+r.id,{ status, next_follow_up:next,
        ...(pub?{public_summary:pub}:{}), ...(products?{products_discussed:products}:{}), first_touched_at, last_action_date:today() });
      toast("Touch logged."); S.busy=false; await load();
    }catch(e){ toast("Couldn't log the touch. Try again.",false); S.busy=false; render(); }
  };
}

load().then(()=>{
  try{ if(localStorage.getItem('cp_seen_version')!==APP_VERSION){ S.showChangelog=true; render(); } }catch(e){}
});
</script>
</body>
</html>
