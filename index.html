<script>
// ---- Live Supabase (PostgREST) ----------------------------------------

// Auth: the access token, once someone signs in, rides on every REST call in
// place of the anon key. That's what lets RLS see who they are when you turn it on.
let SB_TOKEN = null;
const authHeader = () => "Bearer " + (SB_TOKEN || SB_KEY);
const H = { get apikey(){ return SB_KEY; }, get Authorization(){ return authHeader(); }, "Content-Type": "application/json" };

// --- Supabase Auth (email + password), spoken to over plain fetch ---
const AUTH_URL = SB_ORIGIN + "/auth/v1";
const authHeaders = { apikey: SB_KEY, "Content-Type": "application/json" };
async function authSignIn(email, password){
  const r = await fetch(AUTH_URL + "/token?grant_type=password", { method:"POST", headers:authHeaders, body:JSON.stringify({ email, password }) });
  const data = await r.json();
  if(!r.ok) throw new Error(data.error_description || data.msg || data.error || "Sign-in failed");
  return data; // { access_token, refresh_token, user, ... }
}
async function authRefresh(refresh_token){
  const r = await fetch(AUTH_URL + "/token?grant_type=refresh_token", { method:"POST", headers:authHeaders, body:JSON.stringify({ refresh_token }) });
  if(!r.ok) throw new Error("refresh failed");
  return r.json();
}
async function authUpdatePassword(newPassword){
  const r = await fetch(AUTH_URL + "/user", { method:"PUT", headers:{...authHeaders, Authorization:"Bearer "+SB_TOKEN}, body:JSON.stringify({ password:newPassword }) });
  const data = await r.json();
  if(!r.ok) throw new Error(data.error_description || data.msg || "Couldn't update password");
  return data;
}
function saveSession(sess){
  SB_TOKEN = sess.access_token;
  try{ localStorage.setItem("cp_session", JSON.stringify({ access_token:sess.access_token, refresh_token:sess.refresh_token, email:(sess.user&&sess.user.email)||S.authEmail })); }catch(_){}
}
function clearSession(){
  SB_TOKEN = null;
  try{ localStorage.removeItem("cp_session"); }catch(_){}
}
async function signOut(){
  try{ await fetch(AUTH_URL + "/logout", { method:"POST", headers:{...authHeaders, Authorization:"Bearer "+SB_TOKEN} }); }catch(_){}
  clearSession();
  S.authed=false; S.authEmail=null; S.persona=null;
  render();
}
const sbGet = async p => { const r = await fetch(SB_URL + "/" + p, { headers: H }); if (!r.ok) throw new Error(await r.text()); return r.json(); };
async function sbGetAll(table, extra){
  const all=[]; const page=1000; let offset=0;
  while(true){
    const batch=await sbGet(table+"?select=*"+(extra||"")+"&limit="+page+"&offset="+offset);
    all.push(...batch);
    if(batch.length<page || offset>200000) break;
    offset+=page;
  }
  return all;
}
function logActivity(event, detail){
  try{ sbPost("cp_activity",{ actor:(S.persona&&S.persona.name)||"?", actor_role:(S.persona&&S.persona.type)||"?", event, detail:detail||null }).catch(()=>{}); }catch(_){}
}
const sbPost = async (t, b) => { const r = await fetch(SB_URL + "/" + t, { method:"POST", headers:{...H, Prefer:"return=representation"}, body:JSON.stringify(b) }); if (!r.ok) throw new Error(await r.text()); return r.json(); };
const sbPatch = async (t, f, b) => { const r = await fetch(SB_URL + "/" + t + "?" + f, { method:"PATCH", headers:{...H, Prefer:"return=representation"}, body:JSON.stringify(b) }); if (!r.ok) throw new Error(await r.text()); return r.json(); };
const sbDelete = async (t, f) => { const r = await fetch(SB_URL + "/" + t + "?" + f, { method:"DELETE", headers:H }); if (!r.ok) throw new Error(await r.text()); return true; };

function addCadence(dateStr, val, unit){
  const d=new Date(dateStr+"T00:00:00"); const n=Number(val)||1;
  if(unit==="months") d.setMonth(d.getMonth()+n);
  else if(unit==="days") d.setDate(d.getDate()+n);
  else d.setDate(d.getDate()+n*7);
  return d.toISOString().slice(0,10);
}

        if(me) S.persona={ id:me.id, name:me.name, role:ROLE_LABEL[me.role]||me.role, type:me.role }; }
    }
    if(act) S.activity = await act;

function parseCSV(text){
  const out=[]; const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  for(const line of lines){
    const cells=[]; let cur="", inQ=false;
    for(let i=0;i<line.length;i++){ const ch=line[i];
      if(inQ){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;} else inQ=false; } else cur+=ch; }
      else { if(ch==='"') inQ=true; else if(ch===','){cells.push(cur);cur="";} else cur+=ch; } }
    cells.push(cur); out.push(cells.map(c=>c.trim()));
  }
  return out;
}
function csvToCustomers(text){
  const rows=parseCSV(text); if(!rows.length) return [];
  let start=0, idx={name:0,account:1,address1:2,address2:3,city:4,state:5,zip:6,phone:7};
  const first=rows[0].map(c=>c.toLowerCase());
  if(first.some(c=>/name|account|address|addr|city|state|zip|phone|customer/.test(c))){
    start=1;
    const find=(...keys)=>{ for(let i=0;i<first.length;i++){ if(keys.some(k=>first[i].includes(k))) return i; } return -1; };
    const a1=find("address 1","address1","addr 1","addr1","street","address"); const a2=find("address 2","address2","addr 2","addr2","suite","unit");
    idx={ name:find("name","customer"), account:find("account","acct","number","#"), address1:a1, address2:a2, city:find("city"), state:find("state"), zip:find("zip","postal"), phone:find("phone","tel","cell") };
    // fall back to positions for any not found
    const def={name:0,account:1,address1:2,address2:3,city:4,state:5,zip:6,phone:7};
    for(const k in idx){ if(idx[k]<0) idx[k]=def[k]; }
  }
  const get=(r,i)=> i>=0 ? (r[i]||"").trim()||null : null;
  const out=[];
  for(let i=start;i<rows.length;i++){ const r=rows[i]; const name=(r[idx.name]||"").trim(); if(!name) continue;
    out.push({ name, account_number:get(r,idx.account), address1:get(r,idx.address1), address2:get(r,idx.address2), city:get(r,idx.city), state:get(r,idx.state), zip:get(r,idx.zip), phone:get(r,idx.phone) }); }
  return out;
}
function addrLines(r){
  const l1=[r.address1,r.address2].filter(Boolean).join(", ");
  const l2=[r.city, [r.state,r.zip].filter(Boolean).join(" ").trim()].filter(Boolean).join(", ");
  return { l1, l2, any:!!(l1||l2) };
}

function csvToManufacturers(text){
  const rows=parseCSV(text); if(!rows.length) return [];
  let start=0;
  const first=(rows[0][0]||"").toLowerCase();
  if(/manufacturer|brand|name|vendor|supplier/.test(first) && rows.length>1) start=1;

  for(let i=start;i<rows.length;i++){

  }

}

function bindLogin(){
  const go=document.getElementById("au_go");
  if(go){
    const attempt=async()=>{
      const email=(document.getElementById("au_email").value||"").trim();
      const pw=document.getElementById("au_pw").value||"";
      if(!email||!pw){ S.authErr="Enter your email and password."; render(); return; }
      S.authBusy=true; S.authErr=null; S.authEmail=email; render();
      try{
        const sess=await authSignIn(email,pw);
        saveSession(sess);
        await afterLogin(email);
      }catch(e){
        S.authBusy=false;
        S.authErr = /invalid/i.test(e.message) ? "That email or password isn't right." : e.message;
        render();
      }
    };
    go.onclick=attempt;
    ["au_email","au_pw"].forEach(id=>{ const el=document.getElementById(id); if(el) el.onkeydown=e=>{ if(e.key==="Enter") attempt(); }; });
  }
  const save=document.getElementById("pw_save");
  if(save) save.onclick=async()=>{
    const a=document.getElementById("pw_new").value||"", b=document.getElementById("pw_new2").value||"";
    if(a.length<8){ S.authErr="Use at least 8 characters."; render(); return; }
    if(a!==b){ S.authErr="Those two don't match."; render(); return; }
    S.authBusy=true; S.authErr=null; render();
    try{ await authUpdatePassword(a); S.needsPw=false; S.authBusy=false; toast("Password saved."); render(); }
    catch(e){ S.authBusy=false; S.authErr=e.message; render(); }
  };
  const skip=document.getElementById("pw_skip");
  if(skip) skip.onclick=()=>{ S.needsPw=false; render(); };
}

function opts(arr, sel){ return arr.map(o=>`<option ${o===sel?"selected":""}>${esc(o)}</option>`).join(""); }
function groupedOpts(groups, sel){
  return groups.map(([label,items])=> label
    ? `<optgroup label="${esc(label)}">${opts(items,sel)}</optgroup>`

}
// Sales can't pick "New" (it's the counter's opening state). If a record is still New,
// The detailed touch form only advances in-progress statuses. Won/Lost/Close
// happen via quick actions, so they're not selectable here — but if a lead is
// already at one of those (or New), we show it as a locked "current" marker.
function statusOptions(current){
  const forward = ["Assigned","Contacted","Visited","Quote pending","Needs more info"];
  const head = forward.includes(current) ? "" : `<option value="${esc(current)}" selected disabled>${esc(stLabel(current))} (current)</option>`;
  return head + forward.map(s=>`<option ${s===current?"selected":""}>${esc(s)}</option>`).join("");
}

function viewSubmit() {
  const emp = S.persona.type==="employee";
  const tech = S.persona.type==="tech";
  const canLogTech = ["employee","manager","admin"].includes(S.persona.type);
  const canAssign = ["manager","admin"].includes(S.persona.type);
  const mode = emp ? "counter" : (S.submitMode||"field");
  const isLead = mode==="lead";
  // A manager directs anyone. A salesperson can only refer across to tech, and
  // tech can only refer across to sales — handing work sideways stays a manager's call.
  const leadTargetRoles = S.persona.type==="sales" ? ["tech"] : S.persona.type==="tech" ? ["sales"] : ["sales","tech","manager"];
  const leadAssignees = () => {
    const src=(S.people||[]).filter(x=>x.active && leadTargetRoles.includes(x.role)).map(x=>x.name);

        <label class="f" style="position:relative"><span class="lbl">Account # <span style="color:#94a3b8;font-weight:400">(search or fill)</span></span><input id="p_account" placeholder="Start typing…"/><div id="p_account_ac" class="acbox"></div></label>

      <label class="f" style="margin-top:12px"><span class="lbl">Address 2</span><input id="p_addr2" placeholder="Suite / unit (optional)"/></label>
      <div class="grid2" style="margin-top:12px">
        <label class="f"><span class="lbl">City</span><input id="p_city"/></label>
        <label class="f"><span class="lbl">State</span><input id="p_state"/></label>
        <label class="f"><span class="lbl">Zip</span><input id="p_zip"/></label>
      </div>
      <label class="f" style="margin-top:16px"><span class="lbl">What are we monitoring? <span class="req">*</span></span><textarea id="p_reason" placeholder="Scope of the job, what to keep an eye on, who's involved."></textarea></label>

  const stale = sales && OPEN_STATUSES.includes(r.status) && age>5;
  return `<button class="item" data-open="${r.id}" style="border-left:4px solid ${stageColor(r.status)}">
    <div style="min-width:0">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="cust">${esc(r.customer_name)}</span>${pill(r.status)}
        ${sales?`<span class="urg"><span class="udot" style="background:${r.urgency==='High'?'#f43f5e':r.urgency==='Medium'?'#f59e0b':'#94a3b8'}"></span>${esc(r.urgency)}</span>`:""}
        ${stale?`<span class="aging">${I.warn}${age}d aging</span>`:""}
        ${r.source==='Field call'?`<span style="font-size:11px;font-weight:600;color:#1e40af;background:#dbeafe;padding:1px 7px;border-radius:999px">Field call</span>`:""}

      </div>
      <div class="meta">
        <span>${I.bldg}${esc(r.branch)}</span>
        <span>${esc(r.category)}${sales && r.source!=='Field call'?` · wants: ${esc(r.suggested_action)}`:""}</span>
        ${sales?`<span>by ${esc(r.submitted_by)}</span><span class="muted">${r.assigned_to==='Unassigned'?'unassigned':'→ '+esc(r.assigned_to)}</span>`:`<span>${I.clock}Submitted ${esc(relDay(r.submitted_at))}</span>`}

function viewNotes(){
  const nf=S.noteFilter||"needs";
  const nscope=S.noteScope || (isFieldLevel(S.persona)?"mine":"everyone");
  let data=cardsWithNotes();
  if(nscope==="mine") data=data.filter(x=>x.r.assigned_to===S.persona.name);
  if(nf==="needs") data=data.filter(x=>x.status==="needs");
  else if(nf==="addressed") data=data.filter(x=>x.status==="addressed");
  data.sort((a,b)=> (a.status===b.status?0:a.status==="needs"?-1:1) || (b.last.created_at>a.last.created_at?1:-1));
  const seg=[["needs","Needs reply"],["addressed","Replied"],["all","All"]].map(([k,l])=>`<button data-notefilter="${k}" class="${nf===k?'active':''}">${l}</button>`).join("");
  const scopeSeg=[["mine","Mine"],["everyone","Everyone"]].map(([k,l])=>`<button data-notescope="${k}" class="${nscope===k?'active':''}">${l}</button>`).join("");
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
    <div class="modeseg">${seg}</div>
    <div class="modeseg">${scopeSeg}</div>
  </div>
  <div class="tiny muted" style="margin-bottom:10px">Manager notes on ${nscope==='mine'?'your':'all'} leads. “Needs reply” means the manager had the last word — reply or mark it addressed to close the loop.</div>
  ${data.length?`<div class="stack">${data.map(x=>noteRow(x,'sales')).join("")}</div>`:`<div class="tiny muted" style="font-style:italic;padding:24px 0">Nothing here — you're all caught up. 🎉</div>`}`;
}
function viewMine() {
  const isEmp = S.persona.type==="employee";
  const everyone = !isEmp && S.subScope==="everyone";
  const base = everyone ? S.rows : S.rows.filter(r=>r.submitted_by===S.persona.name);
  const mf = S.mineFilter;

      ? empty(I.clip, mf==="Closed"?"Nothing closed yet":"Nothing open right now","Try a different filter above to see the rest.")

          ? "Spot a customer worth a call? Tap “Submit a Request” — it'll land right here so you can watch what happens."

}

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:12px">
      <h1 class="page">Sales follow-up dashboard</h1>

      <div class="filters">${typeSeg}</div>

      <div class="filters">${fs.map(x=>`<button data-filter="${x}" class="${x===f?'active':''}">${x}</button>`).join("")}</div>

    ${stageLegend()}
    ${list.length===0

function calDate(r){
  const open = OPEN_STATUSES.includes(r.status);
  if(open) return r.next_follow_up || r.submitted_at;
  return r.last_action_date || r.next_follow_up || r.submitted_at;
}
function viewCalendar(){
  const now=new Date();
  if(S.calY==null){ S.calY=now.getFullYear(); S.calM=now.getMonth(); }
  const view=S.calView||"month";
  const st=S.calStatus||"open";
  const person=S.calPerson||"Everyone";
  const passes=r=>{ const open=OPEN_STATUSES.includes(r.status); if(st==="open"&&!open)return false; if(st==="completed"&&open)return false; if(person!=="Everyone"&&r.assigned_to!==person)return false; return true; };
  const statusSeg=[["open","Open"],["completed","Completed"],["all","All"]].map(([k,l])=>`<button data-calstatus="${k}" class="${st===k?'active':''}">${l}</button>`).join("");
  const people=["Everyone",...salespeopleList().filter(p=>p!=="Unassigned"),"Unassigned"];
  const personSel=`<select class="sortsel" data-calperson>${people.map(p=>`<option ${p===person?'selected':''}>${esc(p)}</option>`).join("")}</select>`;
  const viewSeg=`<div class="modeseg"><button data-calview="month" class="${view==='month'?'active':''}">Month</button><button data-calview="day" class="${view==='day'?'active':''}">Day</button></div>`;
  const controls=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">${viewSeg}<div class="modeseg">${statusSeg}</div>${personSel}</div>`;

  if(view==="day"){
    if(!S.calDay) S.calDay=today();
    const dayCards=S.rows.filter(passes).filter(r=>String(calDate(r)||"").slice(0,10)===S.calDay).sort((a,b)=>((a.assigned_to||"")<(b.assigned_to||"")?-1:1));
    const label=new Date(S.calDay+"T00:00:00").toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
    const nav=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="qbtn" data-daynav="prev">‹ Prev</button>
      <div style="font-weight:700;font-size:16px;min-width:200px;text-align:center">${label}</div>
      <button class="qbtn" data-daynav="next">Next ›</button>
      <button class="linkish" data-daynav="today" style="margin-left:4px">Today</button>
    </div>`;
    const listHtml = dayCards.length ? `<div class="stack">${dayCards.map(r=>`
      <button class="dayrow" data-open="${r.id}">
        <span class="cdot" style="background:${stageColor(r.status)}"></span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:14px;color:#0f172a;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${esc(r.customer_name)} ${pill(r.status)} ${sourceBadge(r)}</div>
          <div class="tiny muted" style="margin-top:3px">${esc(r.assigned_to||'Unassigned')} · ${esc(r.branch||'')}${r.phone?' · '+esc(r.phone):''}</div>
          ${(r.follow_up_topic||r.public_summary||r.reason)?`<div class="tiny" style="color:#475569;margin-top:3px">${esc(r.follow_up_topic||r.public_summary||r.reason)}</div>`:""}
        </div>
      </button>`).join("")}</div>` : `<div class="tiny muted" style="font-style:italic;padding:20px 0">Nothing scheduled for this day in this filter.</div>`;
    return `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px">
      ${nav}
      ${controls}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div class="tiny muted">${dayCards.length} card${dayCards.length===1?'':'s'} on this day — ${st==='open'?'by follow-up date':st==='completed'?'by completion date':'open & completed'}.</div>
      <button class="qbtn" data-printday="1">${I.printer}Print this day</button>
    </div>
    ${stageLegend()}
    ${listHtml}`;
  }

  const y=S.calY, m=S.calM;
  const byDay={};
  S.rows.filter(passes).forEach(r=>{ const d=calDate(r); if(!d) return; const dt=new Date(String(d).slice(0,10)+"T00:00:00"); if(dt.getFullYear()===y&&dt.getMonth()===m){ const day=dt.getDate(); (byDay[day]=byDay[day]||[]).push(r); } });
  const daysInMonth=new Date(y,m+1,0).getDate();
  const startDow=new Date(y,m,1).getDay();
  const monthName=new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr=today();
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="calcell out"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const items=(byDay[day]||[]);
    const chips=items.slice(0,4).map(r=>`<button class="calchip" data-open="${r.id}"><span class="cdot" style="background:${stageColor(r.status)}"></span><span class="nm">${esc(r.customer_name)}</span></button>`).join("");
    const more=items.length>4?`<button class="linkish" data-calday="${iso}" style="font-size:11px;padding-left:2px">+${items.length-4} more</button>`:"";
    cells+=`<div class="calcell${iso===todayStr?' today':''}"><button class="caldaynum" data-calday="${iso}" title="Open day view">${day}</button>${chips}${more}</div>`;
  }
  const total=Object.values(byDay).reduce((s,a)=>s+a.length,0);
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <button class="qbtn" data-calnav="prev">‹ Prev</button>
      <div style="font-weight:700;font-size:16px;min-width:150px;text-align:center">${monthName}</div>
      <button class="qbtn" data-calnav="next">Next ›</button>
      <button class="linkish" data-calnav="today" style="margin-left:4px">Today</button>
    </div>
    ${controls}
  </div>
  <div class="tiny muted" style="margin-bottom:10px">${total} card${total===1?'':'s'} shown — ${st==='open'?'placed by follow-up date':st==='completed'?'placed by completion date':'open by follow-up, completed by close date'}. Tap a day number for a printable day view.</div>
  ${stageLegend()}
  <div class="calwrap"><div class="calgrid">
    ${dows.map(d=>`<div class="caldow">${d}</div>`).join("")}
    ${cells}
  </div></div>`;
}
function printDay(){
  const st=S.calStatus||"open", person=S.calPerson||"Everyone", day=S.calDay||today();
  const passes=r=>{ const open=OPEN_STATUSES.includes(r.status); if(st==="open"&&!open)return false; if(st==="completed"&&open)return false; if(person!=="Everyone"&&r.assigned_to!==person)return false; return true; };
  const list=S.rows.filter(passes).filter(r=>String(calDate(r)||"").slice(0,10)===day).sort((a,b)=>((a.assigned_to||"")<(b.assigned_to||"")?-1:1));
  const label=new Date(day+"T00:00:00").toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const rowsHtml=list.map(r=>`<tr>
    <td class="chk">&#9744;</td>
    <td><b>${esc(r.customer_name)}</b><div class="sub">${esc(r.branch||'')}${person==='Everyone'?' · '+esc(r.assigned_to||'Unassigned'):''}</div></td>
    <td>${(()=>{const a=addrLines(r);return a.any?(esc(a.l1)+(a.l1&&a.l2?'<br>':'')+esc(a.l2)):'—';})()}</td>
    <td>${esc(r.phone||r.email||'—')}</td>
    <td>${esc(stLabel(r.status))}</td>
    <td>${esc(r.follow_up_topic||r.public_summary||r.reason||'')}</td>
  </tr>`).join("");
  const who = person==="Everyone" ? "Team" : esc(person);
  const title=`${who} — ${label}`;
  const css="body{font-family:system-ui,-apple-system,sans-serif;margin:28px;color:#111}h1{font-size:18px;margin:0 0 2px}.m{color:#666;font-size:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;border-bottom:2px solid #111;padding:6px 8px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}td{border-bottom:1px solid #ddd;padding:9px 8px;vertical-align:top}.chk{font-size:18px;width:22px}.sub{color:#666;font-size:11px;margin-top:2px}.empty{color:#666;font-style:italic;margin-top:20px}@media print{body{margin:0}}";
  const table=list.length? `<table><thead><tr><th>Done</th><th>Customer</th><th>Address</th><th>Phone / email</th><th>Status</th><th>What to do</th></tr></thead><tbody>${rowsHtml}</tbody></table>` : `<div class="empty">Nothing scheduled for this day.</div>`;
  const w=window.open("","_blank");
  if(!w){ toast("Allow pop-ups to print the day.",false); return; }
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${title}</title><style>${css}</style></head><body><h1>${title}</h1><div class="m">Printed ${today()} · ${list.length} stop${list.length===1?'':'s'}</div>${table}<scr`+`ipt>window.onload=function(){window.print();}</scr`+`ipt></body></html>`);
  w.document.close();
}

// One pass over the touches — every report view reads from this.
function timeData(){
  const mgr = ["manager","admin","viewer"].includes(S.persona.type);
  const end=S.trEnd||today();
  const start=S.trStart||(()=>{ const d=new Date(); d.setDate(d.getDate()-6); return isoLocal(d); })();
  const who = mgr ? (S.trWho||"Everyone") : S.persona.name;
  const inRange=u=>{ const d=String(u.update_date||u.created_at||"").slice(0,10); return d>=start && d<=end; };
  let logged=S.updates.filter(u=>Number(u.minutes)>0 && inRange(u));
  if(who!=="Everyone") logged=logged.filter(u=>u.author===who);
  const byId={}; S.rows.forEach(r=>byId[r.id]=r);
  const people={}, byCust={}, byDay={}, byType={sales:0,tech:0};
  logged.forEach(u=>{
    const a=u.author||"?"; const r=byId[u.request_id];
    const cust=(r&&r.customer_name)||"(unknown)";
    const mins=Number(u.minutes);
    const d=String(u.update_date||u.created_at||"").slice(0,10);
    people[a]=people[a]||{total:0,custs:{}};
    people[a].total+=mins; people[a].custs[cust]=(people[a].custs[cust]||0)+mins;
    byCust[cust]=(byCust[cust]||0)+mins;
    byDay[d]=(byDay[d]||0)+mins;
    byType[isTech(r)?"tech":"sales"]+=mins;
  });
  const list=Object.entries(people).sort((a,b)=>b[1].total-a[1].total);
  const grand=list.reduce((s,[,v])=>s+v.total,0);
  return {mgr,start,end,who,logged,people,list,grand,byCust,byDay,byType};
}

// Columns per day, or per week once the range gets long enough that days would be unreadable.
function dayCols(byDay, start, end){
  const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00");
  const span=Math.round((e-s)/86400000)+1;
  if(!(span>0)) return `<div class="tiny muted" style="font-style:italic;padding:8px 0">Pick a valid date range.</div>`;
  const buckets=[];
  if(span<=35){
    for(let i=0;i<span;i++){ const d=new Date(s); d.setDate(d.getDate()+i);
      buckets.push({ label:(d.getMonth()+1)+"/"+d.getDate(), v:byDay[isoLocal(d)]||0, wknd:(d.getDay()===0||d.getDay()===6) }); }
  } else {
    const cur=new Date(s);
    while(cur<=e){ let v=0; const wk=new Date(cur);
      for(let i=0;i<7;i++){ const d=new Date(cur); d.setDate(d.getDate()+i); if(d>e) break; v+=byDay[isoLocal(d)]||0; }
      buckets.push({ label:(wk.getMonth()+1)+"/"+wk.getDate(), v, wknd:false });
      cur.setDate(cur.getDate()+7); }
  }
  const max=Math.max(1,...buckets.map(b=>b.v));
  const step=Math.ceil(buckets.length/12);
  const bars=buckets.map(b=>`<div class="colslot" title="${esc(b.label)} — ${fmtHrs(b.v)}">
    <div class="colval">${b.v?fmtHrs(b.v):""}</div>
    <div class="colbar" style="height:${b.v?Math.max((b.v/max)*100,3):0}%;${b.v?"":"background:#e2e8f0;height:2px"}"></div>
  </div>`).join("");
  const labels=buckets.map((b,i)=>`<div class="collabel" style="${b.wknd?"color:#cbd5e1":""}">${i%step===0?esc(b.label):""}</div>`).join("");
  return `<div class="colwrap">${bars}</div><div class="collabels">${labels}</div>
    <div class="tiny muted" style="margin-top:8px">${span<=35?"One column per day":"One column per week"} · hover a column for the exact time.</div>`;
}

const RISK_CATEGORIES = ["Lost customer","Buying elsewhere","Bad experience","Competitor issue","Pricing concern"];
const statBox = (k,v,sub,color) => `<div class="card stat"><div class="k">${k}</div><div class="v" style="${color||''}">${v}</div>${sub?`<div class="s">${sub}</div>`:''}</div>`;

// --- Customers: who are we actually touching, and who's slipping away? ---
function customerReport(){
  const cards=cardsInRange(), touches=touchesInRange();
  const byId={}; S.rows.forEach(r=>byId[r.id]=r);
  const norm=s=>(s||"").trim().toLowerCase();
  const seen=new Set();
  cards.forEach(r=>{ if(r.customer_name) seen.add(norm(r.customer_name)); });
  touches.forEach(u=>{ const r=byId[u.request_id]; if(r&&r.customer_name) seen.add(norm(r.customer_name)); });
  const dir=(S.customers||[]).length;
  const cov = dir ? (seen.size/dir*100) : 0;
  const byCards = tally(cards, r=>r.customer_name).slice(0,10);
  const byTouch = {};
  touches.forEach(u=>{ const r=byId[u.request_id]; if(!r) return; const k=r.customer_name||"(unknown)"; byTouch[k]=(byTouch[k]||0)+1; });
  const topTouch = Object.entries(byTouch).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const risk = cards.filter(r=>RISK_CATEGORIES.includes(r.category));
  const riskBy = tally(risk, r=>r.category);
  return `${reportHead("Customers","Who's getting attention, and who's showing warning signs.")}
  <div class="stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
    ${statBox("Customers touched", String(seen.size), "in this range")}
    ${statBox("Directory coverage", dir?cov.toFixed(1)+"%":"\u2014", dir?("of "+dir.toLocaleString()+" on file"):"no directory loaded")}
    ${statBox("Warning signs", String(risk.length), "cards flagged at risk", risk.length?"color:#e11d48":"color:#16a34a")}
  </div>
  <div class="grid2" style="gap:16px;margin-bottom:16px">
    <div class="card">
      <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">Most cards</h2>
      <div class="tiny muted" style="margin-bottom:12px">Customers generating the most activity.</div>
      ${hbars(byCards, "#2563eb", nfmt)}
    </div>
    <div class="card">
      <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">Most touches</h2>
      <div class="tiny muted" style="margin-bottom:12px">Customers we're working hardest.</div>
      ${hbars(topTouch, "#0d9488", nfmt)}
    </div>
  </div>
  <div class="card">
    <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">Warning signs</h2>
    <div class="tiny muted" style="margin-bottom:12px">Cards flagged for reasons that mean a customer may be drifting. Tap any to open it.</div>
    ${riskBy.length?`<div style="margin-bottom:14px">${hbars(riskBy, "#e11d48", nfmt)}</div>`:""}
    ${risk.length? `<div class="stack">${risk.slice(0,15).map(r=>`<button class="dayrow" data-noteopen="${r.id}" style="align-items:center;justify-content:space-between;border-left-color:${stageColor(r.status)}">
      <div style="min-width:0"><div style="font-size:14px;font-weight:600;color:#334155">${esc(r.customer_name)}</div>
      <div class="tiny muted">${esc(r.category)} \u00b7 ${esc(r.branch||"")} \u00b7 ${r.assigned_to==="Unassigned"?"unassigned":esc(r.assigned_to)}</div></div>
      ${pill(r.status)}
    </button>`).join("")}</div>` : `<div class="tiny muted" style="font-style:italic;padding:8px 0">No warning signs in this range. \u{1F389}</div>`}
  </div>`;
}

// --- Outcomes: are we actually closing things, and how fast? ---
function outcomesReport(){
  const cards=cardsInRange();
  const n=st=>cards.filter(r=>r.status===st).length;
  const won=n("Won"), lost=n("Lost"), res=n("Resolved"), unres=n("Unresolved");
  const open=cards.filter(r=>OPEN_STATUSES.includes(r.status)).length;
  const winRate = (won+lost) ? Math.round(won/(won+lost)*100)+"%" : "\u2014";
  const resRate = (res+unres) ? Math.round(res/(res+unres)*100)+"%" : "\u2014";
  const touched=cards.filter(r=>r.first_touched_at);
  const resp = touched.length ? (touched.reduce((s,r)=>s+days(r.submitted_at,r.first_touched_at),0)/touched.length).toFixed(1)+"d" : "\u2014";
  const closed=cards.filter(r=>!OPEN_STATUSES.includes(r.status) && r.last_action_date);
  const cycle = closed.length ? (closed.reduce((s,r)=>s+days(r.submitted_at,r.last_action_date),0)/closed.length).toFixed(1)+"d" : "\u2014";
  const mix=[["Open",open],["Won",won],["Lost",lost],["Resolved",res],["Unresolved",unres],["Closed",n("No action needed")]].filter(x=>x[1]>0);
  const mixColor = l => stageColor(l==="Closed"?"No action needed":l==="Open"?"New":l);
  const byPerson={};
  cards.forEach(r=>{ if(!["Won","Lost","Resolved","Unresolved"].includes(r.status)) return;
    const k=r.assigned_to||"Unassigned"; byPerson[k]=byPerson[k]||{good:0,bad:0};
    if(r.status==="Won"||r.status==="Resolved") byPerson[k].good++; else byPerson[k].bad++; });
  const people=Object.entries(byPerson).sort((a,b)=>(b[1].good+b[1].bad)-(a[1].good+a[1].bad));
  const aging=cards.filter(r=>OPEN_STATUSES.includes(r.status));
  const buckets=[["0\u20132 days",0],["3\u20135 days",0],["6\u201310 days",0],["Over 10 days",0]];
  aging.forEach(r=>{ const a=days(r.submitted_at,today()); if(a<=2)buckets[0][1]++; else if(a<=5)buckets[1][1]++; else if(a<=10)buckets[2][1]++; else buckets[3][1]++; });
  const ageColor = l => l==="Over 10 days"?"#e11d48":l==="6\u201310 days"?"#f59e0b":"#0d9488";
  return `${reportHead("Outcomes","Whether the work is closing \u2014 and how long it takes.")}
  <div class="stats" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    ${statBox("Win rate", winRate, "of decided sales leads", won?"color:#16a34a":"")}
    ${statBox("Resolve rate", resRate, "of closed tech cases", res?"color:#16a34a":"")}
    ${statBox("Avg response", resp, "submitted \u2192 first touch")}
    ${statBox("Avg time to close", cycle, "submitted \u2192 closed")}
  </div>
  <div class="grid2" style="gap:16px;margin-bottom:16px">
    <div class="card">
      <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">Where cards ended up</h2>
      <div class="tiny muted" style="margin-bottom:12px">Cards created in this range, by their status today.</div>
      ${hbars(mix, mixColor, nfmt)}
    </div>
    <div class="card">
      <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">How long open work has been sitting</h2>
      <div class="tiny muted" style="margin-bottom:12px">Still-open cards by age. Red is the pile to worry about.</div>
      ${hbars(buckets.filter(b=>b[1]>0), ageColor, nfmt)}
    </div>
  </div>
  <div class="card">
    <h2 style="font-size:16px;font-weight:600;margin:0 0 2px">Results by person</h2>
    <div class="tiny muted" style="margin-bottom:12px">Decided cards only \u2014 <span style="color:#16a34a;font-weight:600">won or resolved</span> vs <span style="color:#e11d48;font-weight:600">lost or unresolved</span>.</div>
    ${people.length? people.map(([who,v])=>{ const tot=v.good+v.bad;
      return `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:600;color:#334155">${esc(who)}</span><span class="tiny muted">${v.good} of ${tot} \u00b7 ${Math.round(v.good/tot*100)}%</span></div>
        <div class="splitbar" style="height:20px">
          ${v.good?`<div class="splitseg" style="width:${v.good/tot*100}%;background:#16a34a">${v.good}</div>`:""}
          ${v.bad?`<div class="splitseg" style="width:${v.bad/tot*100}%;background:#e11d48">${v.bad}</div>`:""}
        </div>
      </div>`; }).join("")
    : `<div class="tiny muted" style="font-style:italic;padding:8px 0">Nothing decided in this range yet.</div>`}
  </div>`;
}

// ---- Events -----------------------------------------------------------
function bind() {
  const signoutBtn=document.querySelector("[data-signout]"); if(signoutBtn) signoutBtn.onclick=()=>{ if(confirm("Sign out of Customer Pulse?")) signOut(); };
  document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ S.tab=b.dataset.tab; S.selectedId=null; S.search=""; S.special=null; render(); });
  const qs=document.querySelector("[data-search]"); if(qs) qs.oninput=()=>{ S.search=qs.value; S._focus="q_search"; render(); };
  const qc=document.querySelector("[data-clearsearch]"); if(qc) qc.onclick=()=>{ S.search=""; S._focus="q_search"; render(); };
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{ S.selectedId=b.dataset.open; render(); });
  document.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>{ S.selectedId=null; render(); });
  document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{ S.filter=b.dataset.filter; S.special=null; render(); });
  document.querySelectorAll("[data-typefilter]").forEach(b=>b.onclick=()=>{ S.typeFilter=b.dataset.typefilter; render(); });
  document.querySelectorAll("[data-minefilter]").forEach(b=>b.onclick=()=>{ S.mineFilter=b.dataset.minefilter; render(); });
  document.querySelectorAll("[data-subscope]").forEach(b=>b.onclick=()=>{ S.subScope=b.dataset.subscope; render(); });
  const so=document.querySelector("[data-sort]"); if(so) so.onchange=()=>{ S.sort=so.value; render(); };
  document.querySelectorAll("[data-refresh]").forEach(rf=>rf.onclick=()=>{ load({full:true}); toast("Refreshed from database."); });
  function wireDrop(zoneId, fileId, stateKey){
    const dz=document.getElementById(zoneId); if(!dz) return;
    const fileEl=document.getElementById(fileId);
    const stage=(f)=>{
      if(!f) return;
      if(!/\.csv$/i.test(f.name) && f.type!=="text/csv"){ toast("That doesn't look like a CSV file.",false); return; }
      S[stateKey]=f; render();
    };
    dz.onclick=()=>{ if(!S.busy) fileEl.click(); };
    fileEl.onchange=()=>stage(fileEl.files&&fileEl.files[0]);
    ["dragenter","dragover"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.add("over"); }));
    ["dragleave","drop"].forEach(ev=>dz.addEventListener(ev,e=>{ e.preventDefault(); e.stopPropagation(); dz.classList.remove("over"); }));

    catch(e){ toast("Couldn't schedule. Try again.",false); S.busy=false; render(); }
  };

  const pb=document.getElementById("p_submit");
  if(pb) pb.onclick=async()=>{
    const g=id=>document.getElementById(id).value.trim();
    const customer=g("p_customer"), reason=g("p_reason"), assigned=document.getElementById("p_assigned").value;
    if(!customer||!reason){ toast("Project name and what you're monitoring are required.",false); return; }
    const payload={ submitted_by:S.persona.name, customer_name:customer, account_number:g("p_account")||null, contact_name:g("p_contact")||null, phone:g("p_phone")||null, address1:g("p_addr1")||null, address2:g("p_addr2")||null, city:g("p_city")||null, state:g("p_state")||null, zip:g("p_zip")||null,
      branch:document.getElementById("p_branch").value, suggested_action:"Visit", category:"Large job / project", urgency:"Medium", reason:reason,
      source:"Project", assigned_to:assigned, status:(assigned&&assigned!=="Unassigned")?"Assigned":"New", type:S.persona.type==="tech"?"tech":"sales",
      next_follow_up:document.getElementById("p_next").value||null, first_touched_at:null, last_action_date:today() };
    S.busy=true; render();
    try{ await sbPost("cp_requests",payload); logActivity("submit","created a project: "+customer); toast("Project created — it's on the board."); S.tab="sales"; S.scope="everyone"; S.busy=false; await load(); }
    catch(e){ toast("Couldn't create the project. Try again.",false); S.busy=false; render(); }
  };

  const us=document.getElementById("u_save");
  if(us) us.onclick=async()=>{
    const r=S.rows.find(x=>x.id===S.selectedId);
    const gv=id=>document.getElementById(id).value.trim();
    const nv=id=>Number(document.getElementById(id).value)||0;
    const type=document.getElementById("u_type").value;
    const status=touchMapFor(r)[type]||r.status;
    const mins=Number(document.getElementById("u_mins").value)||null;
    const note=gv("u_note");
    const next=document.getElementById("u_next").value||null;
    const pub=gv("u_public");
    const products=gv("u_products")||null;
    const topic=gv("u_topic")||null;
    const quoteno=gv("u_quoteno")||null, quoted=nv("u_quoted");
    const orderno=gv("u_orderno")||null, ordered=nv("u_ordered");
    const first_touched_at=r.first_touched_at||today();
    S.busy=true; render();
    try{
      // 1. append the touch (never overwrites earlier ones)
      await sbPost("cp_updates",{ request_id:r.id, update_date:today(), contact_type:type, status, note:note||null, author:S.persona.name, minutes:mins,
        products_discussed:products, follow_up_topic:topic, quote_number:quoteno, quoted_value:quoted, order_number:orderno, ordered_value:ordered, public_summary:pub||null });
      // 2. update the lead's current snapshot (ownership is set separately, at the lead level)
      await sbPatch("cp_requests","id=eq."+r.id,{ status, next_follow_up:next,
        ...(pub?{public_summary:pub}:{}), ...(products?{products_discussed:products}:{}), first_touched_at, last_action_date:today() });
      logActivity("touch","logged a touch on "+(r.customer_name||"")); toast("Touch logged."); S.busy=false; await load();
    }catch(e){ toast("Couldn't log the touch. Try again.",false); S.busy=false; render(); }
  };
}

["dragover","drop"].forEach(ev=>window.addEventListener(ev,e=>{ e.preventDefault(); }));

// Boot: try to resume a saved session. If it works, go straight in.
// If not — or if there's no session — show the login screen.
(async function boot(){
  let saved=null;
  try{ saved=JSON.parse(localStorage.getItem("cp_session")||"null"); }catch(_){}
  if(saved && saved.refresh_token){
    try{
      const fresh=await authRefresh(saved.refresh_token);
      saveSession(fresh);
      await afterLogin((fresh.user&&fresh.user.email)||saved.email);
      if(S.authed){
        try{ if(localStorage.getItem('cp_seen_version')!==APP_VERSION){ S.showChangelog=true; render(); } }catch(e){}
        return;
      }
    }catch(_){ clearSession(); }
  }
  render(); // not signed in → login screen
})();
</script>
