<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>Set your password · Customer Pulse</title>
<style>
  :root { --accent:#7c3aed; }
  * { box-sizing:border-box; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; color:#1e293b; margin:0;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
         background:linear-gradient(160deg,#0f172a,#1e293b); }
  button { font-family:inherit; cursor:pointer; }
  .shell { width:100%; max-width:380px; }
  .brand { text-align:center; margin-bottom:24px; }
  .logo { display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px;
          border-radius:14px; background:var(--accent); margin-bottom:14px; color:#fff; font-size:24px; }
  .title { font-size:22px; font-weight:700; color:#fff; }
  .sub { font-size:13px; color:#94a3b8; margin-top:2px; }
  .card { background:#fff; border-radius:16px; padding:24px; }
  .h { font-size:15px; font-weight:600; color:#0f172a; margin-bottom:4px; }
  .tiny { font-size:12px; }
  .muted { color:#64748b; }
  input { width:100%; border:1px solid #e2e8f0; border-radius:9px; padding:10px 12px; font-size:16px;
          font-family:inherit; background:#fff; margin-bottom:10px; }
  input:focus { outline:none; border-color:#94a3b8; box-shadow:0 0 0 3px rgba(15,23,42,.06); }
  .btn { background:var(--accent); color:#fff; border:none; border-radius:9px; padding:11px 16px;
         font-size:14px; font-weight:600; width:100%; }
  .btn[disabled] { opacity:.4; cursor:not-allowed; }
  .linkish { background:none; border:none; color:var(--accent); font-size:12px; font-weight:600;
             padding:0; width:100%; text-align:center; margin-top:12px; }
  .err { font-size:13px; color:#dc2626; margin-bottom:12px; }
  .ok  { font-size:13px; color:#166534; background:#dcfce7; border:1px solid #bbf7d0;
         border-radius:9px; padding:10px 12px; margin-bottom:14px; }
  .warn { font-size:13px; color:#92400e; background:#fffbeb; border:1px solid #fde68a;
          border-radius:9px; padding:10px 12px; margin-bottom:14px; }
  a.btnlink { display:block; text-align:center; text-decoration:none; background:var(--accent); color:#fff;
              border-radius:9px; padding:11px 16px; font-size:14px; font-weight:600; }
</style>
</head>
<body>
<div class="shell">
  <div class="brand">
    <div class="logo">&#9889;</div>
    <div class="title">Customer Pulse</div>
    <div class="sub">Legacy Group &middot; set your password</div>
  </div>
  <div class="card" id="card">
    <div class="tiny muted">Checking your link&hellip;</div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Customer Pulse — password reset.
// Deliberately mirrors index.html: raw fetch against /auth/v1, the same
// authHeaders shape, and the same "cp_session" localStorage key. No SDK.
// If the anon key is ever rotated, it must be changed HERE and in index.html.
// ---------------------------------------------------------------------------
const SB_ORIGIN = "https://xfcjxmoqsfcvlskievgx.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmY2p4bW9xc2Zjdmxza2lldmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMjk4NzYsImV4cCI6MjA5ODYwNTg3Nn0.lrZdijIuSOQxZMNFFdm_sjPgvJQFrYj41ihr-FhrU30";
const AUTH_URL = SB_ORIGIN + "/auth/v1";
const authHeaders = { apikey: SB_KEY, "Content-Type": "application/json" };
const APP_URL = "/";               // back to index.html
const MIN_PW = 8;                  // matches the app's own wording

let TOKEN = null;                  // the recovery access_token, once we have it
let EMAIL = "";                    // best-effort, for display and re-send
let busy = false;

const el = document.getElementById("card");
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// --- auth calls, same shape as index.html -----------------------------------
async function authUpdatePassword(newPassword){
  const r = await fetch(AUTH_URL + "/user", {
    method:"PUT",
    headers:{...authHeaders, Authorization:"Bearer "+TOKEN},
    body:JSON.stringify({ password:newPassword })
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error_description || data.msg || data.error || "Couldn't update your password");
  return data;
}
async function authVerifyTokenHash(token_hash){
  const r = await fetch(AUTH_URL + "/verify", {
    method:"POST", headers:authHeaders,
    body:JSON.stringify({ type:"recovery", token_hash })
  });
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error_description || data.msg || "That link is no longer valid");
  return data;
}
async function authRecover(email){
  const r = await fetch(AUTH_URL + "/recover", {
    method:"POST", headers:authHeaders,
    body:JSON.stringify({ email, redirect_to: location.origin + location.pathname })
  });
  // Deliberately not surfacing failures in detail — see requestView().
  return r.ok;
}
async function serverSignOut(){
  if(!TOKEN) return;
  try{
    await fetch(AUTH_URL + "/logout", {
      method:"POST", headers:{...authHeaders, Authorization:"Bearer "+TOKEN}
    });
  }catch(_){}
}
function clearAppSession(){
  // Same key index.html's boot() reads. If a stale one survived, the user
  // would be silently resumed instead of re-authenticating with the new password.
  try{ localStorage.removeItem("cp_session"); }catch(_){}
}

// --- views ------------------------------------------------------------------
function formView(err){
  el.innerHTML = `
    <div class="h">Set a new password</div>
    <div class="tiny muted" style="margin-bottom:16px">${EMAIL ? "For <b>"+esc(EMAIL)+"</b>. " : ""}Pick something you'll remember &mdash; you'll sign in with it straight after.</div>
    ${err?`<div class="err">${esc(err)}</div>`:""}
    <input type="password" id="pw1" placeholder="New password (${MIN_PW}+ characters)" autocomplete="new-password"/>
    <input type="password" id="pw2" placeholder="Type it again" autocomplete="new-password"/>
    <button class="btn" id="save" ${busy?"disabled":""}>${busy?"Saving&hellip;":"Save password"}</button>`;
  const save = document.getElementById("save");
  const attempt = async () => {
    const a = document.getElementById("pw1").value || "";
    const b = document.getElementById("pw2").value || "";
    if(a.length < MIN_PW) return formView("Use at least "+MIN_PW+" characters.");
    if(a !== b) return formView("Those two don't match.");
    busy = true; formView();
    try{
      await authUpdatePassword(a);
      await serverSignOut();       // invalidate the recovery session server-side
      clearAppSession();           // and locally, so they must sign in fresh
      TOKEN = null;
      busy = false;
      doneView();
    }catch(e){
      busy = false;
      formView(e.message);
    }
  };
  save.onclick = attempt;
  ["pw1","pw2"].forEach(id => {
    const i = document.getElementById(id);
    if(i) i.onkeydown = e => { if(e.key === "Enter") attempt(); };
  });
}

function doneView(){
  el.innerHTML = `
    <div class="ok">Password saved.</div>
    <div class="tiny muted" style="margin-bottom:16px">You've been signed out everywhere. Sign in with your new password to continue.</div>
    <a class="btnlink" href="${APP_URL}">Go to sign in</a>`;
}

function requestView(msg, tone){
  el.innerHTML = `
    <div class="${tone==="warn"?"warn":"err"}">${esc(msg)}</div>
    <div class="h">Send a new link</div>
    <div class="tiny muted" style="margin-bottom:14px">Reset links are single-use and expire. Enter your work email and we'll send a fresh one.</div>
    <input type="email" id="em" placeholder="Your work email" value="${esc(EMAIL)}" autocomplete="username"/>
    <button class="btn" id="send" ${busy?"disabled":""}>${busy?"Sending&hellip;":"Send reset link"}</button>
    <button class="linkish" onclick="location.href='${APP_URL}'">Back to sign in</button>`;
  const send = document.getElementById("send");
  const go = async () => {
    const email = (document.getElementById("em").value || "").trim();
    if(!email){ return requestView("Enter your email address.", "warn"); }
    busy = true; requestView(msg, tone);
    await authRecover(email);
    busy = false;
    // Always the same reply, sent or not — otherwise this page tells a stranger
    // which email addresses have accounts.
    el.innerHTML = `
      <div class="ok">If that email has an account, a reset link is on its way.</div>
      <div class="tiny muted" style="margin-bottom:16px">It expires shortly, so use it soon. Check spam if it doesn't appear.</div>
      <a class="btnlink" href="${APP_URL}">Back to sign in</a>`;
  };
  send.onclick = go;
  const emi = document.getElementById("em");
  if(emi) emi.onkeydown = e => { if(e.key === "Enter") go(); };
}

// --- work out what the link actually gave us --------------------------------
(async function init(){
  const hash  = new URLSearchParams((location.hash || "").replace(/^#/, ""));
  const query = new URLSearchParams(location.search || "");

  // Supabase reports dead links in the hash rather than as an HTTP error.
  const errCode = hash.get("error_code") || query.get("error_code");
  const errDesc = hash.get("error_description") || query.get("error_description");
  if(errCode || hash.get("error") || query.get("error")){
    const expired = /expired|otp/i.test(errCode || errDesc || "");
    return requestView(
      expired ? "That reset link has expired."
              : (errDesc ? decodeURIComponent(errDesc.replace(/\+/g," ")) : "That reset link isn't valid."),
      "warn");
  }

  // 1. Implicit flow — the default when no SDK configures PKCE. Tokens in the hash.
  const at = hash.get("access_token");
  if(at){
    TOKEN = at;
    // Get the token out of the address bar (and out of browser history).
    history.replaceState(null, "", location.pathname);
    try{
      const r = await fetch(AUTH_URL + "/user", { headers:{...authHeaders, Authorization:"Bearer "+TOKEN} });
      if(r.ok){ const u = await r.json(); EMAIL = u.email || ""; }
    }catch(_){}
    return formView();
  }

  // 2. token_hash flow — verify it ourselves to get a session.
  const th = query.get("token_hash") || hash.get("token_hash");
  if(th){
    try{
      const sess = await authVerifyTokenHash(th);
      TOKEN = sess.access_token;
      EMAIL = (sess.user && sess.user.email) || "";
      history.replaceState(null, "", location.pathname);
      return formView();
    }catch(e){
      return requestView(e.message, "warn");
    }
  }

  // 3. PKCE — needs a code_verifier the SDK would have stored. We have no SDK,
  //    so this can't be completed here. Tell the truth rather than fail vaguely.
  if(query.get("code")){
    return requestView(
      "This link needs a sign-in flow this page doesn't support. Ask Kathleen to switch the project's auth flow, or request a new link below.",
      "warn");
  }

  // 4. Someone just opened the page directly.
  return requestView("Open this page from the reset link in your email, or request a new one.", "warn");
})();
</script>
</body>
</html>
